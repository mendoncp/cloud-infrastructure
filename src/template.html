<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Architect Mastery — APIM, Service Bus, RBAC, Networking, Container Apps & AZ-305</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b27; --panel2:#1c2333; --border:#2a3348;
  --text:#e6e9f0; --muted:#9aa4b8; --accent:#4da3ff; --accent2:#7ee0c3;
  --good:#3fb68b; --bad:#e5636c; --warn:#e0b34d; --code:#111726;
  --shadow:0 6px 24px rgba(0,0,0,.35);
}
[data-theme="light"]{
  --bg:#f4f6fa; --panel:#ffffff; --panel2:#eef2f8; --border:#d7deea;
  --text:#1c2333; --muted:#5a6478; --accent:#0f6cbd; --accent2:#0a8f6c;
  --good:#1e8e63; --bad:#c8404a; --warn:#9c7a1f; --code:#f0f3f9;
  --shadow:0 4px 16px rgba(30,40,80,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
header{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.hwrap{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-weight:700;font-size:1.05rem;white-space:nowrap}
.logo span{color:var(--accent)}
nav.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tabbtn{background:none;border:1px solid transparent;color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.92rem;font-family:inherit}
.tabbtn:hover{color:var(--text);background:var(--panel2)}
.tabbtn.active{color:#fff;background:var(--accent);border-color:var(--accent)}
[data-theme="light"] .tabbtn.active{color:#fff}
#themeBtn{margin-left:auto;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer}
main{max-width:1200px;margin:0 auto;padding:24px 20px 80px}
.view{display:none}
.view.active{display:block}
/* STUDY */
.studywrap{display:grid;grid-template-columns:250px 1fr;gap:24px}
aside#toc{position:sticky;top:70px;align-self:start;max-height:calc(100vh - 90px);overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
#toc a{display:block;padding:6px 10px;border-radius:7px;color:var(--muted);font-size:.9rem}
#toc a:hover{background:var(--panel2);color:var(--text);text-decoration:none}
#toc a.on{background:var(--panel2);color:var(--accent);font-weight:600}
article.content{min-width:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:28px 32px}
.content h1{font-size:1.6rem;margin-bottom:10px}
.content h2{font-size:1.35rem;margin:34px 0 12px;padding-top:18px;border-top:2px solid var(--border);color:var(--accent)}
.content h2:first-of-type{border-top:none;margin-top:6px;padding-top:0}
.content h3{font-size:1.08rem;margin:22px 0 8px;color:var(--accent2)}
.content p{margin:10px 0;color:var(--text)}
.content ul,.content ol{margin:10px 0 10px 24px}
.content li{margin:5px 0}
.content table{border-collapse:collapse;width:100%;margin:14px 0;font-size:.92rem}
.content th,.content td{border:1px solid var(--border);padding:8px 10px;text-align:left;vertical-align:top}
.content th{background:var(--panel2)}
.content code{background:var(--code);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:.88em;font-family:Consolas,'Courier New',monospace}
.content pre{background:var(--code);border:1px solid var(--border);border-radius:10px;padding:14px;overflow:auto;margin:14px 0}
.content pre code{background:none;border:none;padding:0}
.content strong{color:var(--text)}
.content hr{border:none;border-top:1px solid var(--border);margin:26px 0}
.content blockquote{border-left:3px solid var(--accent);padding:6px 14px;margin:12px 0;background:var(--panel2);border-radius:0 8px 8px 0}
/* QUIZ */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:var(--shadow)}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
select,button.btn{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.92rem;cursor:pointer;font-family:inherit}
button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.btn:disabled{opacity:.45;cursor:not-allowed}
.qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:.88rem;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.qtext{font-size:1.08rem;font-weight:600;margin-bottom:16px}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;margin:8px 0;cursor:pointer;font-size:.95rem;font-family:inherit;transition:border-color .15s}
.opt:hover:not(:disabled){border-color:var(--accent)}
.opt.correct{border-color:var(--good);background:color-mix(in srgb,var(--good) 14%,var(--panel2))}
.opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,var(--panel2))}
.explain{margin-top:14px;padding:12px 14px;border-left:3px solid var(--accent);background:var(--panel2);border-radius:0 10px 10px 0;font-size:.92rem;display:none}
.progressbar{height:6px;background:var(--panel2);border-radius:4px;margin-bottom:16px;overflow:hidden}
.progressbar div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .3s}
.scorebox{text-align:center;padding:30px}
.scorebox .big{font-size:3rem;font-weight:800;color:var(--accent)}
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:18px;text-align:left}
.catline{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.88rem}
/* FLASHCARDS */
.fcstage{perspective:1200px;max-width:660px;margin:0 auto}
.fcard{position:relative;width:100%;min-height:320px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s}
.fcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px;border-radius:16px;border:1px solid var(--border);background:var(--panel);box-shadow:var(--shadow)}
.face.back{transform:rotateY(180deg);background:var(--panel2)}
.face .cat{position:absolute;top:14px;left:16px;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.face .hint{position:absolute;bottom:12px;color:var(--muted);font-size:.78rem}
.face .txt{font-size:1.15rem;font-weight:600}
.face.back .txt{font-size:1rem;font-weight:400}
.fcnav{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:18px;flex-wrap:wrap}
.fccount{color:var(--muted);font-size:.9rem;min-width:90px;text-align:center}
.knowbtns{display:flex;gap:10px;justify-content:center;margin-top:12px}
.kb{border-radius:8px;padding:8px 18px;border:1px solid var(--border);cursor:pointer;font-family:inherit;font-size:.9rem}
.kb.know{background:color-mix(in srgb,var(--good) 18%,var(--panel));color:var(--good);border-color:var(--good)}
.kb.dontknow{background:color-mix(in srgb,var(--bad) 14%,var(--panel));color:var(--bad);border-color:var(--bad)}
.fcstats{text-align:center;color:var(--muted);font-size:.85rem;margin-top:10px}
/* INLINE QUICK CHECK */
.inlinequiz{background:var(--panel2);border:1px dashed var(--accent);border-radius:12px;padding:16px 18px;margin:14px 0}
.inlinequiz .iq{margin:14px 0;padding-top:10px;border-top:1px solid var(--border)}
.inlinequiz .iq:first-of-type{border-top:none;padding-top:0}
.inlinequiz .iqq{font-weight:600;margin-bottom:8px}
.inlinequiz .opt{background:var(--panel)}
.inlinequiz .iqscore{margin-top:14px;font-weight:700;color:var(--accent)}
footer{border-top:1px solid var(--border);color:var(--muted);text-align:center;padding:24px;font-size:.85rem}
@media(max-width:900px){.studywrap{grid-template-columns:1fr}aside#toc{position:static;max-height:none}}
</style>
</head>
<body data-theme="dark">
<header>
  <div class="hwrap">
    <div class="logo">☁️ Azure Architect <span>Mastery</span></div>
    <nav class="tabs">
      <button class="tabbtn active" data-view="study">📘 Study Guide</button>
      <button class="tabbtn" data-view="quiz">✅ Quiz</button>
      <button class="tabbtn" data-view="cards">🃏 Flashcards</button>
    </nav>
    <button id="themeBtn" title="Toggle theme">🌙 / ☀️</button>
  </div>
</header>
<main>
  <!-- STUDY -->
  <section id="view-study" class="view active">
    <div class="studywrap">
      <aside id="toc"></aside>
      <article class="content" id="content">__CONTENT__</article>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="view-quiz" class="view">
    <div class="card">
      <div class="controls">
        <label>Category:
          <select id="quizCat"></select>
        </label>
        <label>Questions:
          <select id="quizLen">
            <option>10</option><option selected>20</option><option>40</option><option value="all">All</option>
          </select>
        </label>
        <button class="btn primary" id="quizStart">Start quiz</button>
        <span id="quizBank" style="color:var(--muted);font-size:.85rem"></span>
      </div>
      <div id="quizArea"></div>
    </div>
  </section>

  <!-- FLASHCARDS -->
  <section id="view-cards" class="view">
    <div class="card">
      <div class="controls">
        <label>Category:
          <select id="fcCat"></select>
        </label>
        <button class="btn" id="fcShuffle">🔀 Shuffle</button>
        <button class="btn" id="fcReset">Reset progress</button>
        <span id="fcBank" style="color:var(--muted);font-size:.85rem"></span>
      </div>
      <div class="fcstage">
        <div class="fcard" id="fcard">
          <div class="face front"><span class="cat" id="fcCatLbl"></span><div class="txt" id="fcFront"></div><span class="hint">click / space to flip</span></div>
          <div class="face back"><span class="cat" id="fcCatLbl2"></span><div class="txt" id="fcBack"></div><span class="hint">click / space to flip back</span></div>
        </div>
      </div>
      <div class="fcnav">
        <button class="btn" id="fcPrev">← Prev</button>
        <span class="fccount" id="fcCount"></span>
        <button class="btn" id="fcNext">Next →</button>
      </div>
      <div class="knowbtns">
        <button class="kb know" id="fcKnow">✓ I know this</button>
        <button class="kb dontknow" id="fcDont">✗ Review again</button>
      </div>
      <div class="fcstats" id="fcStats"></div>
    </div>
  </section>
</main>
<footer>
  Azure Architect Mastery — APIM · Service Bus · RBAC · Networking · Container Apps · Auth Patterns · AZ-305.
  Built for self-study; verify details against <a href="https://learn.microsoft.com" target="_blank" rel="noopener">learn.microsoft.com</a>.
</footer>
<script>
const QUIZ = __QUIZ__;
const CARDS = __CARDS__;
const CATNAMES = {APIM:"API Management",ServiceBus:"Service Bus",RBAC:"RBAC & Governance",Networking:"Networking",ContainerApps:"Container Apps",Auth:"Auth & Identity",Patterns:"Design Patterns",Exam:"AZ-305 Exam",Data:"Data Storage",BCDR:"Business Continuity",Monitor:"Monitoring",Compute:"Compute",Migration:"Migration & Integration"};

/* ---------- tabs & theme ---------- */
document.querySelectorAll(".tabbtn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".tabbtn").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById("view-"+b.dataset.view).classList.add("active");
  window.scrollTo({top:0});
}));
const themeBtn=document.getElementById("themeBtn");
function setTheme(t){document.body.dataset.theme=t;try{localStorage.setItem("aam-theme",t)}catch(e){}}
themeBtn.addEventListener("click",()=>setTheme(document.body.dataset.theme==="dark"?"light":"dark"));
try{const t=localStorage.getItem("aam-theme");if(t)setTheme(t)}catch(e){}

/* ---------- TOC ---------- */
(function(){
  const toc=document.getElementById("toc");
  document.querySelectorAll("#content h2").forEach((h,i)=>{
    h.id="sec-"+i;
    const a=document.createElement("a");a.href="#sec-"+i;a.textContent=h.textContent;toc.appendChild(a);
  });
  const links=[...toc.querySelectorAll("a")];
  window.addEventListener("scroll",()=>{
    const hs=[...document.querySelectorAll("#content h2")];
    let cur=0;hs.forEach((h,i)=>{if(h.getBoundingClientRect().top<120)cur=i});
    links.forEach((l,i)=>l.classList.toggle("on",i===cur));
  },{passive:true});
})();

/* ---------- helpers ---------- */
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function fillCats(sel,data){
  const cats=[...new Set(data.map(x=>x.c))];
  sel.innerHTML='<option value="all">All categories</option>'+cats.map(c=>`<option value="${c}">${CATNAMES[c]||c}</option>`).join("");
}

/* ---------- QUIZ ---------- */
const quizCat=document.getElementById("quizCat"),quizLen=document.getElementById("quizLen"),quizArea=document.getElementById("quizArea");
fillCats(quizCat,QUIZ);
document.getElementById("quizBank").textContent=QUIZ.length+" questions in bank";
let qSet=[],qIdx=0,qScore=0,qWrong=[];
document.getElementById("quizStart").addEventListener("click",()=>{
  const cat=quizCat.value;
  let pool=cat==="all"?QUIZ:QUIZ.filter(q=>q.c===cat);
  pool=shuffle(pool);
  const n=quizLen.value==="all"?pool.length:Math.min(parseInt(quizLen.value),pool.length);
  qSet=pool.slice(0,n);qIdx=0;qScore=0;qWrong=[];
  renderQ();
});
function finishQ(right,q,extra){
  if(right)qScore++;else qWrong.push(q);
  const ex=document.getElementById("explain");
  ex.innerHTML=(right?"✅ <strong>Correct.</strong> ":"❌ <strong>Not quite.</strong> ")+(extra||"")+q.e;
  ex.style.display="block";
  const meta=quizArea.querySelector(".qmeta span:last-child");
  if(meta)meta.textContent="Score: "+qScore;
  document.getElementById("qNext").disabled=false;
}
function qShell(q,body,checkBtn){
  const type=q.t||"single";
  const hint=type==="multi"?` <em style="color:var(--muted)">(select ${q.a.length})</em>`:type==="order"?` <em style="color:var(--muted)">(click items in order; click again to unpick)</em>`:"";
  quizArea.innerHTML=`
    <div class="progressbar"><div style="width:${(qIdx/qSet.length)*100}%"></div></div>
    <div class="qmeta"><span>Question ${qIdx+1} / ${qSet.length} · ${CATNAMES[q.c]||q.c}</span><span>Score: ${qScore}</span></div>
    <div class="qtext">${q.q}${hint}</div>
    <div id="opts">${body}</div>
    <div class="explain" id="explain"></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
      ${checkBtn?'<button class="btn primary" id="qCheck" disabled>Check answer</button>':""}
      <button class="btn primary" id="qNext" disabled>Next →</button></div>`;
  document.getElementById("qNext").addEventListener("click",()=>{qIdx++;renderQ()});
}
function renderQ(){
  if(qIdx>=qSet.length){return renderScore()}
  const q=qSet[qIdx];
  const type=q.t||"single";
  if(type==="single"){
    const opts=shuffle(q.o.map((t,i)=>({t,ok:i===q.a})));
    qShell(q,opts.map((o,i)=>`<button class="opt" data-ok="${o.ok?1:0}">${String.fromCharCode(65+i)}. ${o.t}</button>`).join(""),false);
    const btns=[...quizArea.querySelectorAll(".opt")];
    btns.forEach(b=>b.addEventListener("click",()=>{
      btns.forEach(x=>{x.disabled=true;if(x.dataset.ok==="1")x.classList.add("correct")});
      const right=b.dataset.ok==="1";
      if(!right)b.classList.add("wrong");
      finishQ(right,q);
    }));
  }else if(type==="multi"){
    const opts=shuffle(q.o.map((t,i)=>({t,ok:q.a.includes(i)})));
    qShell(q,opts.map((o,i)=>`<button class="opt" data-ok="${o.ok?1:0}">${String.fromCharCode(65+i)}. ${o.t}</button>`).join(""),true);
    const btns=[...quizArea.querySelectorAll(".opt")],check=document.getElementById("qCheck");
    btns.forEach(b=>b.addEventListener("click",()=>{
      b.classList.toggle("sel");
      b.style.borderColor=b.classList.contains("sel")?"var(--accent)":"";
      b.style.background=b.classList.contains("sel")?"color-mix(in srgb,var(--accent) 14%,var(--panel2))":"";
      check.disabled=quizArea.querySelectorAll(".opt.sel").length===0;
    }));
    check.addEventListener("click",()=>{
      let right=true;
      btns.forEach(x=>{
        const sel=x.classList.contains("sel"),ok=x.dataset.ok==="1";
        x.disabled=true;x.style.borderColor="";x.style.background="";
        if(ok)x.classList.add("correct");
        if(sel!==ok){right=false;if(sel&&!ok)x.classList.add("wrong")}
      });
      check.disabled=true;
      finishQ(right,q);
    });
  }else{ // order
    const items=shuffle(q.o.map((t,i)=>({t,pos:i})));
    qShell(q,items.map((o,i)=>`<button class="opt" data-pos="${o.pos}"><span class="ordnum" style="display:inline-block;min-width:26px;font-weight:700;color:var(--accent)"></span>${o.t}</button>`).join(""),true);
    const btns=[...quizArea.querySelectorAll(".opt")],check=document.getElementById("qCheck");
    let picked=[];
    const paint=()=>{btns.forEach(b=>{
      const idx=picked.indexOf(b);
      b.querySelector(".ordnum").textContent=idx>=0?(idx+1)+".":"";
      b.style.borderColor=idx>=0?"var(--accent)":"";
    });check.disabled=picked.length!==btns.length};
    btns.forEach(b=>b.addEventListener("click",()=>{
      const idx=picked.indexOf(b);
      if(idx>=0)picked.splice(idx,1);else picked.push(b);
      paint();
    }));
    check.addEventListener("click",()=>{
      let right=true;
      picked.forEach((b,i)=>{
        b.disabled=true;
        const ok=parseInt(b.dataset.pos)===i;
        b.classList.add(ok?"correct":"wrong");
        if(!ok)right=false;
      });
      check.disabled=true;
      const correct="Correct order: "+q.o.map((t,i)=>(i+1)+". "+t).join(" → ")+"<br><br>";
      finishQ(right,q,right?"":correct);
    });
  }
}
function renderScore(){
  const pct=Math.round(qScore/qSet.length*100);
  const byCat={};
  qWrong.forEach(q=>{byCat[q.c]=(byCat[q.c]||0)+1});
  const verdict=pct>=85?"Excellent — exam-ready territory. Target ≥85% consistently.":pct>=70?"Good — the AZ-305 pass mark is ~70%. Review the misses and drill again.":"Keep going — reread the study sections for your weak categories, then retry.";
  quizArea.innerHTML=`<div class="scorebox">
    <div class="big">${pct}%</div>
    <p>${qScore} of ${qSet.length} correct</p>
    <p style="color:var(--muted);max-width:480px;margin:10px auto">${verdict}</p>
    ${qWrong.length?`<div class="catgrid">${Object.entries(byCat).map(([c,n])=>`<div class="catline">⚠️ ${CATNAMES[c]||c}: ${n} missed</div>`).join("")}</div>`:""}
    <div style="margin-top:22px"><button class="btn primary" id="qAgain">Take another quiz</button>
    ${qWrong.length?'<button class="btn" id="qRedo" style="margin-left:8px">Retry missed questions</button>':""}</div>
  </div>`;
  document.getElementById("qAgain").addEventListener("click",()=>{quizArea.innerHTML="";});
  const rd=document.getElementById("qRedo");
  if(rd)rd.addEventListener("click",()=>{qSet=shuffle(qWrong);qIdx=0;qScore=0;qWrong=[];renderQ()});
}

/* ---------- FLASHCARDS ---------- */
const fcCatSel=document.getElementById("fcCat");
fillCats(fcCatSel,CARDS);
document.getElementById("fcBank").textContent=CARDS.length+" cards in deck";
let deck=[],ci=0,known={};
try{known=JSON.parse(localStorage.getItem("aam-known")||"{}")}catch(e){known={}}
const cardEl=document.getElementById("fcard");
function keyOf(c){return c.c+"|"+c.f}
function buildDeck(doShuffle){
  const cat=fcCatSel.value||"all";
  deck=CARDS.filter(c=>cat==="all"||c.c===cat);
  if(doShuffle)deck=shuffle(deck);
  ci=0;showCard();
}
function showCard(){
  if(!deck.length){document.getElementById("fcFront").textContent="No cards";return}
  const c=deck[ci];
  cardEl.classList.remove("flipped");
  document.getElementById("fcCatLbl").textContent=CATNAMES[c.c]||c.c;
  document.getElementById("fcCatLbl2").textContent=CATNAMES[c.c]||c.c;
  document.getElementById("fcFront").textContent=c.f;
  document.getElementById("fcBack").textContent=c.b;
  document.getElementById("fcCount").textContent=(ci+1)+" / "+deck.length;
  updStats();
}
function updStats(){
  const tot=deck.length;
  const k=deck.filter(c=>known[keyOf(c)]).length;
  document.getElementById("fcStats").textContent=`Marked known: ${k} / ${tot} in this deck`;
}
cardEl.addEventListener("click",()=>cardEl.classList.toggle("flipped"));
document.getElementById("fcNext").addEventListener("click",()=>{ci=(ci+1)%deck.length;showCard()});
document.getElementById("fcPrev").addEventListener("click",()=>{ci=(ci-1+deck.length)%deck.length;showCard()});
document.getElementById("fcShuffle").addEventListener("click",()=>buildDeck(true));
fcCatSel.addEventListener("change",()=>buildDeck(false));
document.getElementById("fcKnow").addEventListener("click",()=>{known[keyOf(deck[ci])]=1;save();ci=(ci+1)%deck.length;showCard()});
document.getElementById("fcDont").addEventListener("click",()=>{delete known[keyOf(deck[ci])];save();ci=(ci+1)%deck.length;showCard()});
document.getElementById("fcReset").addEventListener("click",()=>{known={};save();updStats()});
function save(){try{localStorage.setItem("aam-known",JSON.stringify(known))}catch(e){}}
document.addEventListener("keydown",e=>{
  if(!document.getElementById("view-cards").classList.contains("active"))return;
  if(e.code==="Space"){e.preventDefault();cardEl.classList.toggle("flipped")}
  if(e.key==="ArrowRight"){ci=(ci+1)%deck.length;showCard()}
  if(e.key==="ArrowLeft"){ci=(ci-1+deck.length)%deck.length;showCard()}
});
buildDeck(true);

/* ---------- INLINE QUICK CHECKS (after each topic) ---------- */
document.querySelectorAll(".inlinequiz").forEach(div=>{
  const cats=div.dataset.cat.split(",");
  const pool=QUIZ.filter(q=>cats.includes(q.c)&&(!q.t||q.t==="single"));
  if(!pool.length)return;
  const start=()=>{
    const qs=shuffle(pool).slice(0,5);
    let score=0,done=0;
    div.innerHTML=qs.map((q,qi)=>{
      const opts=shuffle(q.o.map((t,i)=>({t,ok:i===q.a})));
      return `<div class="iq" data-qi="${qi}"><div class="iqq">${qi+1}. ${q.q}</div>`+
        opts.map((o,i)=>`<button class="opt" data-ok="${o.ok?1:0}">${String.fromCharCode(65+i)}. ${o.t}</button>`).join("")+
        `<div class="explain"></div></div>`;
    }).join("")+`<div class="iqscore"></div><button class="btn" style="margin-top:10px" id="iqAgain_${Math.random().toString(36).slice(2)}">↻ New questions</button>`;
    qs.forEach((q,qi)=>{
      const box=div.querySelector(`.iq[data-qi="${qi}"]`);
      const btns=[...box.querySelectorAll(".opt")];
      btns.forEach(b=>b.addEventListener("click",()=>{
        btns.forEach(x=>{x.disabled=true;if(x.dataset.ok==="1")x.classList.add("correct")});
        const right=b.dataset.ok==="1";
        if(right)score++;else b.classList.add("wrong");
        const ex=box.querySelector(".explain");
        ex.innerHTML=(right?"✅ ":"❌ ")+q.e;
        ex.style.display="block";
        done++;
        if(done===qs.length)div.querySelector(".iqscore").textContent=`Quick check score: ${score} / ${qs.length}${score===qs.length?" — perfect! 🎉":score>=Math.ceil(qs.length*0.7)?" — solid, review the misses.":" — reread this section, then retry."}`;
      }));
    });
    div.querySelector("button[id^=iqAgain]").addEventListener("click",start);
  };
  div.innerHTML=`<strong>📝 Quick check:</strong> 5 random exam-style questions on this topic (${pool.length} in pool). <button class="btn primary" style="margin-left:8px">Start</button>`;
  div.querySelector("button").addEventListener("click",start);
});
</script>
</body>
</html>
